<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaShield | Módulo Commercial Invoice</title>
    <meta name="description" content="Convertidor de Commercial Invoice — AquaShield by AquaChile">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="js/pdfProcessor.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { primary:'#445565', accent:'#EB5F0A', warm:'#EFE9E5', cool:'#EFEFE0' }}}}}
    </script>

    <style>
        /* ── Industrial Fusion: Light Theme (default) — Manual de Marca AquaChile ── */
        :root {
            --accent:#EB5F0A; --accent-glow:rgba(235,95,10,0.15); --accent-hover:#f57423; --accent-dim:rgba(235,95,10,0.08);
            --bg-main:#EFE9E5; --bg-sidebar:#ffffff; --bg-card:rgba(255,255,255,0.95); --bg-card-hover:rgba(245,240,236,1); --bg-input:#ffffff;
            --border-main:#d9d0c7; --border-hover:#b4a28d; --border-accent:rgba(235,95,10,0.3);
            --text-primary:#445563; --text-secondary:#5a6b7c; --text-muted:#8fa0b0;
            --secondary:#445563; --success:#059669; --danger:#ef4444; --warning:#d97706; --info:#60a5fa;
            --shadow-card:0 4px 20px rgba(0,0,0,0.06); --shadow-glow:0 0 20px rgba(235,95,10,0.1);
            --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            --font-heading:'Quicksand',sans-serif; --font-mono:'JetBrains Mono','Consolas',monospace;
            --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        /* ── Industrial Fusion: Dark Theme — Manual de Marca AquaChile ── */
        body.dark-theme {
            --accent-glow:rgba(235,95,10,0.25); --accent-dim:rgba(235,95,10,0.12);
            --bg-main:#2d3a45; --bg-sidebar:#3a4a58; --bg-card:rgba(58,74,88,0.85); --bg-card-hover:rgba(68,85,99,0.95); --bg-input:#445563;
            --border-main:#4a5a68; --border-hover:#5a6a78;
            --text-primary:#f8fafc; --text-secondary:#e4e6eb; --text-muted:#8fa0b0;
            --secondary:#445563; --success:#10b981; --danger:#ff6b6b; --warning:#fbbf24;
            --shadow-card:0 4px 24px rgba(0,0,0,0.2); --shadow-glow:0 0 30px rgba(235,95,10,0.15);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg-main);color:var(--text-primary);font-family:var(--font);display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background 0.4s ease,color 0.4s ease;}
        .mono{font-family:var(--font-mono);}
        .text-tiny{font-size:0.7rem;letter-spacing:0.04em;}

        .workspace-header{height:64px;background:var(--bg-sidebar);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-main);flex-shrink:0;transition:var(--transition);}
        .brand-logo{filter:none;transition:filter 0.3s ease;}
        body.dark-theme .brand-logo{filter:invert(1) brightness(2);}
        .card-enterprise{background:var(--bg-card);border:1px solid var(--border-main);border-radius:16px;box-shadow:var(--shadow-card);backdrop-filter:blur(12px);transition:var(--transition);}
        .drop-zone{padding:2rem;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border-main);border-radius:12px;transition:var(--transition);cursor:pointer;}
        .drop-zone:hover,.drop-zone.dragging{border-color:var(--accent);background:var(--accent-dim);}

        .btn-primary{font-family:var(--font-heading);font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;border:none;padding:0.8rem 1.5rem;border-radius:10px;cursor:pointer;color:white;background:var(--secondary);transition:var(--transition);}
        .btn-primary:hover:not(:disabled){background:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px var(--accent-glow);}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
        .btn-accent{font-family:var(--font-heading);font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;border:none;padding:0.8rem 1.5rem;border-radius:10px;cursor:pointer;color:white;background:var(--accent);transition:var(--transition);text-decoration:none;}
        .btn-accent:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 8px 20px var(--accent-glow);}

        .notes-textarea{width:100%;padding:10px 12px;border:1px solid var(--border-main);border-radius:8px;font-family:var(--font);font-size:0.75rem;line-height:1.6;resize:vertical;min-height:140px;transition:var(--transition);background:var(--bg-input);color:var(--text-primary);}
        .notes-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
        .notes-textarea::placeholder{color:var(--text-muted);}
        .notes-textarea.overflow-warning{border-color:var(--danger);background:rgba(239,68,68,0.04);}

        .theme-toggle{width:40px;height:40px;background:var(--secondary);border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;box-shadow:0 4px 10px rgba(68,85,99,0.3);transition:var(--transition);}
        .theme-toggle:hover{background:var(--accent);box-shadow:0 4px 14px var(--accent-glow);}
        .avatar{width:40px;height:40px;background:var(--secondary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;box-shadow:0 4px 10px rgba(68,85,99,0.3);}
        .user-profile{display:flex;align-items:center;gap:0.8rem;padding-left:1.5rem;border-left:1px solid var(--border-main);height:24px;}

        /* Progress bar */
        .progress-bar-bg{width:100%;height:4px;background:var(--border-main);border-radius:2px;overflow:hidden;}
        .progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;}

        /* Toast system */
        #toast-container{position:fixed;bottom:2rem;right:2rem;display:flex;flex-direction:column;gap:0.6rem;z-index:9999;pointer-events:none;}
        .toast{pointer-events:auto;background:var(--bg-card);border:1px solid var(--border-main);border-left:4px solid var(--accent);padding:0.8rem 1.2rem;border-radius:10px;box-shadow:var(--shadow-card);animation:toastIn 0.35s ease-out;font-size:0.8rem;font-family:var(--font);color:var(--text-primary);display:flex;align-items:center;gap:0.6rem;max-width:380px;backdrop-filter:blur(12px);}
        .toast.toast-success{border-left-color:var(--success);}
        .toast.toast-error{border-left-color:var(--danger);}
        .toast.toast-warning{border-left-color:var(--warning);}
        .toast.toast-out{animation:toastOut 0.3s ease-in forwards;}
        @keyframes toastIn{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(60px);}}
        @keyframes spin{to{transform:rotate(360deg);}}

        /* File card */
        .file-card{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.7rem;border-radius:8px;border:1px solid var(--border-main);background:var(--bg-input);transition:var(--transition);font-size:0.7rem;}
        .file-card:hover{border-color:var(--border-hover);}
        .file-card .remove-btn{opacity:0;transition:opacity 0.2s;cursor:pointer;color:var(--danger);background:none;border:none;font-size:1rem;line-height:1;padding:0 2px;}
        .file-card:hover .remove-btn{opacity:1;}

        /* History */
        .history-item{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border-main);font-size:0.65rem;}
        .history-item:last-child{border-bottom:none;}

        ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border-main);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}

        /* ── Module Tabs (themed) ── */
        .module-tabs{display:flex;gap:0;background:var(--bg-sidebar);border-bottom:1px solid var(--border-main);flex-shrink:0;padding:0 1.5rem;}
        .module-tab{padding:0.6rem 1.5rem;font-family:var(--font-heading);font-weight:700;font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:var(--transition);}
        .module-tab:hover{color:var(--text-primary);}
        .module-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

        /* ── Mermas styles (themed) ── */
        .mermas-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:0.75rem;}
        .mermas-tbl thead th{background:var(--bg-sidebar);color:var(--text-muted);padding:0.6rem 0.8rem;text-align:left;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:1;font-family:var(--font-heading);}
        .mermas-tbl tbody td{padding:0.5rem 0.8rem;border-bottom:1px solid var(--border-main);transition:all 0.2s;vertical-align:middle;}
        .mermas-tbl tbody tr:hover td{background:var(--bg-card-hover);}
        .mermas-tbl tfoot td{padding:0.7rem 0.8rem;font-weight:700;border-top:2px solid var(--accent);font-family:var(--font-heading);font-size:0.85rem;}
        .m-cajas-input{width:70px;background:rgba(235,95,10,0.12);border:1px solid #EB5F0A;border-radius:6px;padding:4px 8px;color:#EB5F0A;font-family:var(--font-mono);font-weight:700;font-size:0.8rem;text-align:center;outline:none;transition:all 0.2s;}
        .m-cajas-input:focus{box-shadow:0 0 0 3px rgba(235,95,10,0.25);}
        .m-changed{color:#EB5F0A;font-weight:700;}
        .m-original{color:var(--text-muted);text-decoration:line-through;font-size:0.65rem;margin-left:4px;}
        .m-stat-card{background:var(--bg-card);border:1px solid var(--border-main);border-radius:12px;padding:0.8rem;display:flex;flex-direction:column;gap:0.2rem;transition:var(--transition);}
        .m-stat-card:hover{border-color:var(--accent);box-shadow:var(--shadow-glow);}
        .m-preview-panel{background:var(--bg-card);border:1px solid var(--border-main);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
        .m-preview-header{padding:0.6rem 1rem;background:var(--bg-sidebar);border-bottom:1px solid var(--border-main);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .m-preview-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:1rem;background:rgba(0,0,0,0.05);}
        body.dark-theme .m-preview-wrap{background:rgba(0,0,0,0.15);}
        .m-preview-wrap canvas{box-shadow:var(--shadow-card);border-radius:4px;}
        .m-zoom-btn{background:var(--secondary);border:none;color:white;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:700;transition:var(--transition);display:flex;align-items:center;justify-content:center;}
        .m-zoom-btn:hover{background:var(--accent);}

        /* Mermas buttons themed */
        .m-btn{display:flex;align-items:center;gap:4px;background:var(--secondary);color:white;padding:0.5rem 1rem;border-radius:8px;font-size:0.7rem;font-weight:700;font-family:var(--font-heading);border:1px solid var(--border-main);cursor:pointer;transition:var(--transition);text-transform:uppercase;letter-spacing:0.5px;}
        .m-btn:hover{background:var(--accent);border-color:var(--accent);}
        .m-btn:disabled{opacity:0.4;cursor:not-allowed;}
        .m-btn-accent{background:var(--accent);border-color:var(--accent);}
        .m-btn-accent:hover:not(:disabled){background:var(--accent-hover);box-shadow:0 4px 12px var(--accent-glow);}
    </style>
</head>
<body>
    <div id="root" style="display:flex;flex-direction:column;height:100vh;overflow:hidden;"></div>
    <div id="toast-container"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── Toast system (vanilla, outside React) ──
        function showToast(message, type='info', duration=4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success:'✓', error:'✕', warning:'⚠', info:'ℹ' };
            toast.className = 'toast toast-' + type;
            toast.innerHTML = '<span style="font-size:1rem;font-weight:700;">' + (icons[type]||'ℹ') + '</span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 300); }, duration);
        }

        // ── Icons ──
        const SunIcon = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const MoonIcon = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
        const UserIcon = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const UploadCloudIcon = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></svg>;
        const FileTextIcon = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
        const DownloadIcon = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const AlertCircleIcon = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const EditIcon = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const ClockIcon = ({s=14}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrashIcon = ({s=12}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const ChevronLeft = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
        const ChevronRight = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const ArchiveIcon = ({s=14}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>;
        const LayersIcon = ({s=14}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;

        function App() {
          // ═══════════════════════════════════════════════════
          // ── COMMERCIAL INVOICE STATE (unchanged) ──
          // ═══════════════════════════════════════════════════
          const [filesData, setFilesData] = useState([]);
          const [pdfBytes, setPdfBytes] = useState(null);
          const [isProcessing, setIsProcessing] = useState(false);
          const [isRendering, setIsRendering] = useState(false);
          const [outputUrl, setOutputUrl] = useState(null);
          const [outputName, setOutputName] = useState("");
          const [isZip, setIsZip] = useState(false);
          const [error, setError] = useState(null);
          const [isDragging, setIsDragging] = useState(false);
          const [operations, setOperations] = useState([]);
          const [profiles, setProfiles] = useState({ activeId: null, profiles: [] });
          const [isDark, setIsDark] = useState(() => localStorage.getItem('aquashield_invoice_theme') === 'dark');
          const [currentPage, setCurrentPage] = useState(1);
          const [totalPages, setTotalPages] = useState(1);
          const [progressPct, setProgressPct] = useState(0);
          const [progressText, setProgressText] = useState('');
          const [processingTime, setProcessingTime] = useState(null);
          const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem('aquashield_invoice_history') || '[]'); } catch(e) { return []; }});
          const [showHistory, setShowHistory] = useState(false);

          const [userName, setUserName] = useState(() => localStorage.getItem('aquashield_invoice_user') || 'Marcelo Ramírez');
          const [editingName, setEditingName] = useState(false);

          const canvasRef = useRef(null);
          const previewContainerRef = useRef(null);
          const debounceRef = useRef(null);

          // ═══════════════════════════════════════════════════
          // ── MERMAS STATE ──
          // ═══════════════════════════════════════════════════
          const [mPdfBytes, setMPdfBytes] = useState(null);
          const [mFileName, setMFileName] = useState('');
          const [mProducts, setMProducts] = useState([]);
          const [mGrandTotal, setMGrandTotal] = useState({ y: 0, value: 0, x: 540 });
          const [mIsDragging, setMIsDragging] = useState(false);
          const [mIsProcessing, setMIsProcessing] = useState(false);
          const [mIsParsing, setMIsParsing] = useState(false);
          const [mShowPreview, setMShowPreview] = useState(true);
          const [mPreviewScale, setMPreviewScale] = useState(1.2);
          const [activeModule, setActiveModule] = useState('invoice');

          const mCanvasRef = useRef(null);
          const mFileInputRef = useRef(null);
          const mPreviewTimer = useRef(null);

          // ═══════════════════════════════════════════════════
          // ── THEME ──
          // ═══════════════════════════════════════════════════
          useEffect(() => {
              document.body.classList.toggle('dark-theme', isDark);
              localStorage.setItem('aquashield_invoice_theme', isDark ? 'dark' : 'light');
          }, [isDark]);

          // ═══════════════════════════════════════════════════
          // ── INIT & PROFILES ──
          // ═══════════════════════════════════════════════════
          useEffect(() => {
              pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
              window.AquaShieldPDF.init().then(() => {
                  // En GitHub Pages, sincronizar desde profiles.json primero
                  window.AquaShieldPDF.syncFromRemote().then(() => refreshProfiles());
              });
          }, []);

          const refreshProfiles = () => {
              const data = window.AquaShieldPDF.loadProfiles();
              setProfiles(data);
              const active = window.AquaShieldPDF.getActiveProfile(data);
              setOperations(active.operations);
          };

          useEffect(() => {
              const onStorage = (e) => {
                  if (e.key === 'aquashield_profiles_v1') refreshProfiles();
              };
              window.addEventListener('storage', onStorage);
              return () => window.removeEventListener('storage', onStorage);
          }, []);

          const switchProfile = (profileId) => {
              const data = window.AquaShieldPDF.setActiveProfile(profileId);
              setProfiles(data);
              const active = window.AquaShieldPDF.getActiveProfile(data);
              setOperations(active.operations);
              showToast('Perfil: ' + active.name, 'info');
          };

          const saveUserName = (name) => {
              setUserName(name);
              localStorage.setItem('aquashield_invoice_user', name);
              setEditingName(false);
              showToast('Nombre actualizado', 'success');
          };

          const notesOps = operations.filter(op => op.type === 'notes');
          const updateNoteText = (id, newText) => setOperations(prev => prev.map(op => op.id === id ? { ...op, text: newText } : op));

          const formatSize = (bytes) => bytes < 1024 ? bytes + ' B' : bytes < 1048576 ? (bytes/1024).toFixed(1) + ' KB' : (bytes/1048576).toFixed(1) + ' MB';

          // ═══════════════════════════════════════════════════
          // ── COMMERCIAL INVOICE: File Loading ──
          // ═══════════════════════════════════════════════════
          const loadFilesToMemory = async (files) => {
            const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf');
            if (pdfFiles.length === 0) { showToast('Por favor, sube archivos PDF válidos.', 'error'); return; }
            const first = pdfFiles[0];
            const bytes = new Uint8Array(await first.arrayBuffer());
            setPdfBytes(bytes);
            setCurrentPage(1);
            try { const pdf = await pdfjsLib.getDocument({data: new Uint8Array(bytes)}).promise; setTotalPages(pdf.numPages); } catch(e) { setTotalPages(1); }

            const newFilesData = [];
            for (const f of pdfFiles) {
              try { newFilesData.push({ name: f.name, size: f.size, data: new Uint8Array(await f.arrayBuffer()), status: 'pending' }); }
              catch (err) { console.error("Error leyendo:", f.name); }
            }
            setFilesData(newFilesData);
            setOutputUrl(null);
            setError(null);
            setProcessingTime(null);
            showToast(newFilesData.length + ' archivo(s) cargado(s)', 'success');
          };

          const removeFile = (idx) => {
              setFilesData(prev => {
                  const next = prev.filter((_, i) => i !== idx);
                  if (next.length === 0) { setPdfBytes(null); setTotalPages(1); setCurrentPage(1); }
                  return next;
              });
          };

          // ═══════════════════════════════════════════════════
          // ── COMMERCIAL INVOICE: Preview ──
          // ═══════════════════════════════════════════════════
          const renderPreview = async () => {
              if (!pdfBytes || !canvasRef.current || !window.PDFLib) return;
              setIsRendering(true);
              try {
                  const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
                  const pdfDoc = await PDFDocument.load(new Uint8Array(pdfBytes));
                  const font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                  const pages = pdfDoc.getPages();
                  const pageIdx = Math.min(currentPage, pages.length) - 1;
                  const page = pages[pageIdx];
                  const num = (v) => parseFloat(v) || 0;

                  if (pageIdx === 0) {
                      for (const op of operations) {
                          if (op.type === 'rect') {
                              const hex = op.color || '#FFFFFF';
                              const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
                              page.drawRectangle({ x:num(op.x), y:num(op.y), width:num(op.width), height:num(op.height), color:rgb(r,g,b), opacity:1 });
                          } else if (op.type === 'text') {
                              const hex = op.color || '#FF0000';
                              const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
                              page.drawText(op.text || '', { x:num(op.x), y:num(op.y), size:num(op.size||14), font, color:rgb(r,g,b) });
                          } else if (op.type === 'notes') {
                              const hex = op.color || '#000000';
                              const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
                              const fontSize=num(op.size||10), lineH=num(op.lineHeight||fontSize*1.5);
                              const lines = (op.text||'').split('\n');
                              let currentY = num(op.y) + num(op.height||80) - fontSize;
                              for (const line of lines) { page.drawText(line, { x:num(op.x), y:currentY, size:fontSize, font, color:rgb(r,g,b) }); currentY -= lineH; }
                          }
                      }
                  }

                  const modifiedBytes = await pdfDoc.save();
                  const pdf = await pdfjsLib.getDocument({ data: modifiedBytes }).promise;
                  const pdfPage = await pdf.getPage(Math.min(currentPage, pdf.numPages));
                  const containerWidth = previewContainerRef.current ? previewContainerRef.current.clientWidth - 32 : 600;
                  const naturalVp = pdfPage.getViewport({ scale: 1 });
                  const viewport = pdfPage.getViewport({ scale: containerWidth / naturalVp.width });
                  const canvas = canvasRef.current;
                  canvas.width = viewport.width;
                  canvas.height = viewport.height;
                  await pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
              } catch (err) { console.error('Preview error:', err); }
              finally { setIsRendering(false); }
          };

          useEffect(() => {
              if (!pdfBytes) return;
              if (debounceRef.current) clearTimeout(debounceRef.current);
              debounceRef.current = setTimeout(() => renderPreview(), 300);
              return () => { if (debounceRef.current) clearTimeout(debounceRef.current); };
          }, [pdfBytes, operations, currentPage]);

          // ═══════════════════════════════════════════════════
          // ── COMMERCIAL INVOICE: Process ──
          // ═══════════════════════════════════════════════════
          const handleProcess = async () => {
            if (filesData.length === 0) return;
            setIsProcessing(true);
            setError(null);
            setProgressPct(0);
            setProcessingTime(null);
            const startTime = Date.now();

            try {
                const total = filesData.length;
                setFilesData(prev => prev.map(f => ({...f, status: 'processing'})));

                for (let i = 0; i < total; i++) {
                    setProgressText(`Procesando ${i + 1} de ${total}...`);
                    setProgressPct(Math.round(((i) / total) * 100));
                    if (total === 1) await new Promise(r => setTimeout(r, 200));
                    setFilesData(prev => prev.map((f, idx) => idx === i ? {...f, status: 'done'} : f));
                }

                const result = await window.AquaShieldPDF.processFiles(filesData, operations);
                setOutputUrl(result.url);
                setOutputName(result.name);
                setIsZip(result.isZip);
                setProgressPct(100);
                setProgressText('');

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                setProcessingTime(elapsed);

                const entry = { date: new Date().toLocaleString('es-CL'), files: total, name: result.name, time: elapsed + 's' };
                const newHistory = [entry, ...history].slice(0, 20);
                setHistory(newHistory);
                localStorage.setItem('aquashield_invoice_history', JSON.stringify(newHistory));

                showToast(`${total} factura(s) procesada(s) en ${elapsed}s`, 'success');
            } catch (err) {
                console.error(err);
                setError("Hubo un error al procesar.");
                showToast('Error al procesar los PDFs', 'error');
                setFilesData(prev => prev.map(f => ({...f, status: 'error'})));
            } finally {
                setIsProcessing(false);
                setTimeout(() => setProgressPct(0), 2000);
            }
          };

          const clearHistory = () => { setHistory([]); localStorage.removeItem('aquashield_invoice_history'); showToast('Historial limpiado', 'info'); };

          const statusIcon = (s) => s === 'done' ? '✓' : s === 'processing' ? '⟳' : s === 'error' ? '✕' : '⏳';
          const statusColor = (s) => s === 'done' ? 'var(--success)' : s === 'processing' ? 'var(--accent)' : s === 'error' ? 'var(--danger)' : 'var(--text-muted)';

          // ═══════════════════════════════════════════════════
          // ── MERMAS MODULE LOGIC ──
          // ═══════════════════════════════════════════════════
          const mFmtNum = (n, decimals=2) => {
              const parts = n.toFixed(decimals).split('.');
              parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
              return parts.join(',');
          };

          async function mExtractTable(pdfBytes) {
              const pdf = await pdfjsLib.getDocument({data: new Uint8Array(pdfBytes)}).promise;
              const page = await pdf.getPage(1);
              const textContent = await page.getTextContent();
              const items = textContent.items.map(item => ({
                  text: item.str.trim(), x: item.transform[4],
                  y: item.transform[5], width: item.width,
                  fontSize: item.transform[0]
              })).filter(i => i.text);
              items.sort((a, b) => b.y - a.y || a.x - b.x);
              const rows = [];
              let currentRow = [], currentY = items[0]?.y;
              for (const item of items) {
                  if (Math.abs(item.y - currentY) > 4) {
                      if (currentRow.length > 0) rows.push({y: currentY, items: [...currentRow]});
                      currentRow = []; currentY = item.y;
                  }
                  currentRow.push(item);
              }
              if (currentRow.length > 0) rows.push({y: currentY, items: currentRow});

              const productRows = [];

              // ── Formato 1: AquaChile (filas con "Caja" en el texto) ──
              for (let i = 0; i < rows.length; i++) {
                  const row = rows[i];
                  const cajasItem = row.items.find(it => /caja/i.test(it.text));
                  if (!cajasItem) continue;
                  let cajas = 0, cajasFormat = 'unknown';
                  const matchA = cajasItem.text.match(/[¬\-]\s*(\d[\d.,]*)\s*Caja/i);
                  const matchB = cajasItem.text.match(/^(\d[\d.,]*)\s*Caja/i);
                  if (matchA) { cajas = parseInt(matchA[1].replace(/[.,]/g, '')); cajasFormat = 'combined'; }
                  else if (matchB) { cajas = parseInt(matchB[1].replace(/[.,]/g, '')); cajasFormat = 'separate'; }
                  else continue;
                  let mainRow = null;
                  for (let j = i - 1; j >= Math.max(0, i - 4); j--) {
                      if (rows[j].items.some(it => /^\d{6,8}$/.test(it.text) && it.x < 80)) { mainRow = rows[j]; break; }
                  }
                  if (!mainRow) continue;
                  const sorted = [...mainRow.items].sort((a, b) => a.x - b.x);
                  const codeItem = sorted.find(it => /^\d{6,8}$/.test(it.text) && it.x < 80);
                  const qtyItem = sorted.find(it => /\d.*(KG|LB)$/i.test(it.text) && it.x >= 80 && it.x <= 150);
                  let quantity = 0, qtyUnit = 'KG';
                  if (qtyItem) {
                      const um = qtyItem.text.match(/(KG|LB)$/i);
                      qtyUnit = um ? um[1].toUpperCase() : 'KG';
                      quantity = parseFloat(qtyItem.text.replace(/\s*(KG|LB)$/i, '').replace(/\./g, '').replace(',', '.'));
                  }
                  const unitItem = sorted.find(it => /^\d[\d.,]+$/.test(it.text) && it.x >= 440 && it.x <= 530);
                  let unitValue = unitItem ? parseFloat(unitItem.text.replace(/\./g, '').replace(',', '.')) : 0;
                  const totalItem = sorted.filter(it => /^\d[\d.,]+$/.test(it.text) && it.x > 530).pop();
                  let total = totalItem ? parseFloat(totalItem.text.replace(/\./g, '').replace(',', '.')) : 0;
                  const qtyPerBox = cajas > 0 ? quantity / cajas : 0;
                  productRows.push({
                      id: crypto.randomUUID(), code: codeItem?.text || '',
                      originalCajas: cajas, newCajas: cajas, qtyPerBox: Math.round(qtyPerBox * 10000) / 10000,
                      qtyUnit, unitValue, originalQuantity: quantity, originalTotal: total, cajasFormat,
                      qtyItem: qtyItem ? { x: qtyItem.x, y: qtyItem.y, width: qtyItem.width, fontSize: qtyItem.fontSize } : null,
                      totalItem: totalItem ? { x: totalItem.x, y: totalItem.y, width: totalItem.width, fontSize: totalItem.fontSize } : null,
                      cajasItemCoords: { x: cajasItem.x, y: cajasItem.y, width: cajasItem.width, text: cajasItem.text, fontSize: cajasItem.fontSize },
                  });
              }

              // ── Formato 2: Los Fiordos (sin "Caja", números directos en columna CAJAS) ──
              if (productRows.length === 0) {
                  // Buscar fila header con "CAJAS"
                  let headerRowIdx = -1;
                  for (let i = 0; i < rows.length; i++) {
                      if (rows[i].items.some(it => /^CAJAS$/i.test(it.text))) {
                          headerRowIdx = i;
                          break;
                      }
                  }
                  if (headerRowIdx >= 0) {
                      // Saltar fila header + fila subheader (CASES/QUANTITY...)
                      const startIdx = headerRowIdx + 2;
                      for (let i = startIdx; i < rows.length; i++) {
                          const row = rows[i];
                          const sorted = [...row.items].sort((a, b) => a.x - b.x);
                          // Buscar número de cajas en x < 80
                          const cajasItem = sorted.find(it => /^\d[\d.,]*$/.test(it.text) && it.x < 80);
                          if (!cajasItem) continue;
                          const cajas = parseInt(cajasItem.text.replace(/\./g, '').replace(',', ''));
                          if (cajas <= 0 || isNaN(cajas)) continue;
                          // Buscar cantidad con KG/LB
                          const qtyItem = sorted.find(it => /\d.*(KG|LB)$/i.test(it.text) && it.x >= 80 && it.x <= 150);
                          let quantity = 0, qtyUnit = 'KG';
                          if (qtyItem) {
                              const um = qtyItem.text.match(/(KG|LB)$/i);
                              qtyUnit = um ? um[1].toUpperCase() : 'KG';
                              quantity = parseFloat(qtyItem.text.replace(/\s*(KG|LB)$/i, '').replace(/\./g, '').replace(',', '.'));
                          }
                          // Buscar valor unitario (x entre 440 y 530)
                          const unitItem = sorted.find(it => /^\d[\d.,]+$/.test(it.text) && it.x >= 440 && it.x <= 530);
                          let unitValue = unitItem ? parseFloat(unitItem.text.replace(/\./g, '').replace(',', '.')) : 0;
                          // Buscar total (x > 530)
                          const totalItem = sorted.filter(it => /^\d[\d.,]+$/.test(it.text) && it.x > 530).pop();
                          let total = totalItem ? parseFloat(totalItem.text.replace(/\./g, '').replace(',', '.')) : 0;
                          const qtyPerBox = cajas > 0 ? quantity / cajas : 0;
                          productRows.push({
                              id: crypto.randomUUID(), code: '',
                              originalCajas: cajas, newCajas: cajas, qtyPerBox: Math.round(qtyPerBox * 10000) / 10000,
                              qtyUnit, unitValue, originalQuantity: quantity, originalTotal: total, cajasFormat: 'fiordos',
                              qtyItem: qtyItem ? { x: qtyItem.x, y: qtyItem.y, width: qtyItem.width, fontSize: qtyItem.fontSize } : null,
                              totalItem: totalItem ? { x: totalItem.x, y: totalItem.y, width: totalItem.width, fontSize: totalItem.fontSize } : null,
                              cajasItemCoords: { x: cajasItem.x, y: cajasItem.y, width: cajasItem.width, text: cajasItem.text, fontSize: cajasItem.fontSize },
                          });
                      }
                  }
              }

              // ── Grand Total ──
              let grandTotalY = 0, grandTotalValue = 0, grandTotalX = 540;
              for (const row of rows) {
                  if (row.items.some(it => /TOTAL\s*(CIF|CPT|FOB|CFR|FCA)/i.test(it.text))) {
                      const numItem = row.items.filter(it => /^\d[\d.,]+$/.test(it.text) && it.x > 480).pop();
                      if (numItem) { grandTotalValue = parseFloat(numItem.text.replace(/\./g, '').replace(',', '.')); grandTotalY = numItem.y; grandTotalX = numItem.x; }
                      break;
                  }
              }
              return { products: productRows, grandTotal: { y: grandTotalY, value: grandTotalValue, x: grandTotalX } };
          }

          const loadMermasPDF = async (file) => {
              setMIsParsing(true);
              try {
                  const ab = await file.arrayBuffer();
                  const bytes = new Uint8Array(ab);
                  const result = await mExtractTable(bytes);
                  setMPdfBytes(bytes);
                  setMFileName(file.name);
                  setMProducts(result.products);
                  setMGrandTotal(result.grandTotal);
                  if (result.products.length === 0) showToast('No se encontraron productos con "Cajas"', 'warning');
                  else showToast(result.products.length + ' productos encontrados', 'success');
              } catch (err) { console.error('[Mermas] Error:', err); showToast('Error: ' + err.message, 'error'); }
              setMIsParsing(false);
          };

          const updateMCajas = (id, value) => {
              const n = parseInt(value) || 0;
              setMProducts(prev => prev.map(p => p.id === id ? { ...p, newCajas: n } : p));
          };
          const resetMermas = () => { setMProducts(prev => prev.map(p => ({ ...p, newCajas: p.originalCajas }))); showToast('Valores restaurados', 'info'); };

          // Mermas calculated values
          const mCalcProducts = mProducts.map(p => {
              const newQty = p.newCajas * p.qtyPerBox;
              const newTotal = newQty * p.unitValue;
              return { ...p, newQuantity: newQty, newTotal, changed: p.newCajas !== p.originalCajas };
          });
          const mNewGrandTotal = mCalcProducts.reduce((s, p) => s + p.newTotal, 0);
          const mTotalCajasOrig = mProducts.reduce((s, p) => s + p.originalCajas, 0);
          const mTotalCajasNew = mProducts.reduce((s, p) => s + p.newCajas, 0);
          const mHasChanges = mCalcProducts.some(p => p.changed);

          const buildMermasPDF = async () => {
              if (!mPdfBytes || !window.PDFLib) return null;
              try {
                  const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
                  const pdfDoc = await PDFDocument.load(new Uint8Array(mPdfBytes));
                  const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
                  const fontBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                  const page = pdfDoc.getPages()[0];
                  for (const p of mCalcProducts) {
                      if (!p.changed) continue;
                      const qFs = p.qtyItem?.fontSize || 7;
                      const tFs = p.totalItem?.fontSize || 7;
                      const cFs = p.cajasItemCoords?.fontSize || 6;
                      if (p.qtyItem) {
                          page.drawRectangle({ x: p.qtyItem.x - 4, y: p.qtyItem.y - 1.5, width: p.qtyItem.width + 4, height: qFs + 2, color: rgb(1,1,1) });
                          page.drawText(mFmtNum(p.newQuantity) + ' ' + p.qtyUnit, { x: p.qtyItem.x - 4, y: p.qtyItem.y - 1.5, size: qFs, font, color: rgb(0,0,0) });
                      }
                      if (p.totalItem) {
                          page.drawRectangle({ x: p.totalItem.x - 6, y: p.totalItem.y - 1.5, width: p.totalItem.width + 6.5, height: tFs + 2, color: rgb(1,1,1) });
                          page.drawText(mFmtNum(p.newTotal), { x: p.totalItem.x - 6, y: p.totalItem.y - 1.5, size: tFs, font, color: rgb(0,0,0) });
                      }
                      if (p.cajasFormat === 'combined') {
                          const fullText = p.cajasItemCoords.text;
                          const symbolIdx = fullText.indexOf('\u00ac');
                          if (symbolIdx >= 0) {
                              const prop = symbolIdx / fullText.length;
                              const sx = p.cajasItemCoords.x + p.cajasItemCoords.width * prop;
                              const rw = p.cajasItemCoords.width * (1 - prop);
                              page.drawRectangle({ x: sx, y: p.cajasItemCoords.y - 1.5, width: rw + 5, height: cFs + 2, color: rgb(1,1,1) });
                              page.drawText('\u00ac ' + p.newCajas + ' Cajas', { x: sx, y: p.cajasItemCoords.y - 1.5, size: cFs, font, color: rgb(0,0,0) });
                          }
                      } else if (p.cajasFormat === 'separate') {
                          page.drawRectangle({ x: p.cajasItemCoords.x, y: p.cajasItemCoords.y - 1.5, width: p.cajasItemCoords.width + 5, height: cFs + 2, color: rgb(1,1,1) });
                          page.drawText(p.newCajas + ' Cajas', { x: p.cajasItemCoords.x, y: p.cajasItemCoords.y - 1.5, size: cFs, font, color: rgb(0,0,0) });
                      }
                  }
                  if (mGrandTotal.y && mHasChanges) {
                      page.drawRectangle({ x: mGrandTotal.x - 16, y: mGrandTotal.y - 1.5, width: 50, height: 10, color: rgb(1,1,1) });
                      page.drawText(mFmtNum(mNewGrandTotal), { x: mGrandTotal.x - 16, y: mGrandTotal.y - 1.5, size: 8, font: fontBold, color: rgb(0,0,0) });
                  }
                  // Apply Commercial Invoice profile operations (whiteouts, text, stamps, etc.)
                  const activeOps = window.AquaShieldPDF?.loadOperations?.() || [];
                  if (activeOps.length > 0) {
                      await window.AquaShieldPDF.applyOperations(page, fontBold, activeOps);
                  }
                  return await pdfDoc.save();
              } catch (err) { console.error(err); showToast('Error: ' + err.message, 'error'); return null; }
          };

          const downloadMermasPDF = async () => {
              setMIsProcessing(true);
              const bytes = await buildMermasPDF();
              if (bytes) {
                  const blob = new Blob([bytes], { type: 'application/pdf' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a'); a.href = url; a.download = 'MERMA_' + mFileName; a.click();
                  URL.revokeObjectURL(url);
                  showToast('PDF generado: MERMA_' + mFileName, 'success');
              }
              setMIsProcessing(false);
          };

          const renderMermasPreview = useCallback(async () => {
              if (!mPdfBytes) return;
              const canvas = mCanvasRef.current;
              if (!canvas) {
                  setTimeout(() => renderMermasPreview(), 200);
                  return;
              }
              try {
                  let bytesForRender = mPdfBytes;
                  if (mHasChanges) {
                      const mod = await buildMermasPDF();
                      if (mod) bytesForRender = mod;
                  }
                  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(bytesForRender) }).promise;
                  const pg = await pdf.getPage(1);
                  const vp = pg.getViewport({ scale: mPreviewScale });
                  canvas.width = vp.width;
                  canvas.height = vp.height;
                  const ctx = canvas.getContext('2d');
                  ctx.clearRect(0, 0, canvas.width, canvas.height);
                  await pg.render({ canvasContext: ctx, viewport: vp }).promise;
              } catch (err) { console.error('[Mermas] Preview error:', err); }
          }, [mPdfBytes, mProducts, mPreviewScale, mHasChanges]);

          useEffect(() => {
              if (!mPdfBytes || !mShowPreview || activeModule !== 'mermas') return;
              if (mPreviewTimer.current) clearTimeout(mPreviewTimer.current);
              mPreviewTimer.current = setTimeout(() => renderMermasPreview(), 500);
              return () => clearTimeout(mPreviewTimer.current);
          }, [mPdfBytes, mProducts, mPreviewScale, mShowPreview, renderMermasPreview, activeModule]);

          // ═══════════════════════════════════════════════════
          // ── RENDER ──
          // ═══════════════════════════════════════════════════
          return (
            <>
                {/* ═══ HEADER ═══ */}
                <header className="workspace-header">
                    <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                        <img src="logo_aquachile_dark.png" alt="AquaChile" className="brand-logo" style={{height:'36px',objectFit:'contain'}} />
                        <div style={{display:'flex',flexDirection:'column',lineHeight:'1.1'}}>
                            <span style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:'1.4rem',color:'var(--text-primary)',letterSpacing:'2px'}}>AQUASHIELD</span>
                            <span style={{fontSize:'0.8rem',color:'var(--text-muted)'}}>by AquaChile</span>
                        </div>
                        <div style={{height:'32px',width:'1px',backgroundColor:'var(--border-main)',margin:'0 0.5rem'}}></div>
                        <div style={{display:'flex',flexDirection:'column',lineHeight:'1.1',justifyContent:'center'}}>
                            <span style={{fontFamily:'var(--font-heading)',fontWeight:600,fontSize:'0.75rem',color:'var(--accent)',letterSpacing:'2px',textTransform:'uppercase'}}>Módulo</span>
                            <span style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:'1.05rem',color:'var(--text-primary)',letterSpacing:'1px',textTransform:'uppercase'}}>{activeModule === 'invoice' ? 'Commercial Invoice' : 'Factura Mermas'}</span>
                        </div>
                    </div>

                            </div>
                        </div>
                        {/* Right: Preview */}
                        {mShowPreview && (
                            <div className="m-preview-panel" style={{flex:'0 0 44%'}}>
                                <div className="m-preview-header">
                                    <span style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--text-muted)'}}>📄 Vista Previa</span>
                                    <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                                        <button className="m-zoom-btn" onClick={() => setMPreviewScale(s => Math.max(0.5, s - 0.2))}>−</button>
                                        <span className="mono" style={{fontSize:'0.65rem',color:'var(--text-muted)',minWidth:'35px',textAlign:'center'}}>{Math.round(mPreviewScale*100)}%</span>
                                        <button className="m-zoom-btn" onClick={() => setMPreviewScale(s => Math.min(3, s + 0.2))}>+</button>
                                    </div>
                                </div>
                                <div className="m-preview-wrap">
                                    <canvas ref={mCanvasRef} style={{background:'white'}} />
                                </div>
                            </div>
                        )}
                        </>
                    )}
                </div>
                </div>
                )}
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
