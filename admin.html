<body>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── Toast ──
        function showToast(msg, type='info', dur=4000) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            const icons = {success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
            t.className = 'toast toast-' + type;
            t.innerHTML = '<span style="font-size:1rem;font-weight:700;">' + (icons[type]||'ℹ') + '</span><span>' + msg + '</span>';
            c.appendChild(t);
            setTimeout(() => { t.classList.add('toast-out'); setTimeout(() => t.remove(), 300); }, dur);
        }

        // ── Iconos ────────────────────────────────────────
        const Icon = ({d, size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
        const PlusIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const TrashIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const UploadCloud = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></svg>;
        const DownloadIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const SaveIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const EyeIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
        const EyeOffIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
        const CopyIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const MoveIcon = ({size}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>;
        const UserIcon = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;

        // ── Componente principal ───────────────────────────
        function App() {
            const [pdfBytes, setPdfBytes] = useState(null);
            const [pdfFileName, setPdfFileName] = useState("");
            const [isRendering, setIsRendering] = useState(false);
            const [operations, setOperations] = useState([]);
            const [profiles, setProfiles] = useState({ activeId: null, profiles: [] });
            const [editingProfileName, setEditingProfileName] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [showGrid, setShowGrid] = useState(false);
            const [calibrationMode, setCalibrationMode] = useState(false);
            const [saveMessage, setSaveMessage] = useState("");
            const [outputUrl, setOutputUrl] = useState(null);
            const [outputName, setOutputName] = useState("");
            const [isZip, setIsZip] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [multipleFiles, setMultipleFiles] = useState([]);
            const [previewReady, setPreviewReady] = useState(false);
            const [zoom, setZoom] = useState(1.5);
            const [pageDims, setPageDims] = useState({ width: 595, height: 842 });
            const [selectedOpId, setSelectedOpId] = useState(null);
            const [dragState, setDragState] = useState(null);
            const [activeModule, setActiveModule] = useState('invoice');

            // ── Mermas state ──
            const [mPdfBytes, setMPdfBytes] = useState(null);
            const [mFileName, setMFileName] = useState('');
            const [mProducts, setMProducts] = useState([]);
            const [mGrandTotal, setMGrandTotal] = useState({ y: 0, value: 0, x: 540 });
            const [mIsDragging, setMIsDragging] = useState(false);
            const [mIsProcessing, setMIsProcessing] = useState(false);
            const [mIsParsing, setMIsParsing] = useState(false);
            const [mShowPreview, setMShowPreview] = useState(true);
            const [mPreviewScale, setMPreviewScale] = useState(1.2);

            const canvasRef = useRef(null);
            const previewContainerRef = useRef(null);
            const debounceTimer = useRef(null);
            const renderTaskRef = useRef(null);
            const hasAutoZoomed = useRef(false);

            useEffect(() => {
                window.AquaShieldPDF.init().then(() => {
                    const data = window.AquaShieldPDF.loadProfiles();
                    setProfiles(data);
                    const active = window.AquaShieldPDF.getActiveProfile(data);
                    setOperations(active.operations);
                });
            }, []);

            const switchProfile = (profileId) => {
                // 1. Guardar ops actuales en el perfil ACTUAL (antes de cambiar)
                const currentData = window.AquaShieldPDF.loadProfiles();
                const currentProfile = currentData.profiles.find(p => p.id === currentData.activeId);
                if (currentProfile) {
                    currentProfile.operations = [...operations]; // clonar para seguridad
                    window.AquaShieldPDF.saveProfiles(currentData);
                }
                // 2. Cambiar al nuevo perfil
                const data = window.AquaShieldPDF.setActiveProfile(profileId);
                setProfiles({...data});
                // 3. Cargar operaciones del nuevo perfil
                const newActive = data.profiles.find(p => p.id === profileId);
                setOperations(newActive ? [...newActive.operations] : []);
                showToast('Perfil: ' + (newActive?.name || ''), 'info');
            };

            const handleCreateProfile = () => {
                // Guardar ops actuales antes de crear nuevo perfil
                saveCurrentToProfile(operations);
                const name = prompt('Nombre del nuevo perfil:');
                if (!name) return;
                const data = window.AquaShieldPDF.createProfile(name);
                setProfiles({...data});
                setOperations([]);
                showToast('Perfil "' + name + '" creado', 'success');
            };

            const handleDeleteProfile = () => {
                if (profiles.profiles.length <= 1) { showToast('No puedes eliminar el último perfil', 'warning'); return; }
                const active = window.AquaShieldPDF.getActiveProfile(profiles);
                if (!confirm('¿Eliminar perfil "' + active.name + '"?')) return;
                const data = window.AquaShieldPDF.deleteProfile(active.id);
                setProfiles({...data});
                const newActive = window.AquaShieldPDF.getActiveProfile(data);
                setOperations(newActive ? [...newActive.operations] : []);
                showToast('Perfil eliminado', 'warning');
            };

            const handleRenameProfile = (newName) => {
                if (!newName) return;
                const data = window.AquaShieldPDF.renameProfile(profiles.activeId, newName);
                setProfiles(data);
                setEditingProfileName(false);
                showToast('Perfil renombrado', 'success');
            };

            // ── Coordinate helpers (PDF ↔ Screen) ──
            const n = (v) => parseFloat(v) || 0;
            const pdfToScreenX = (pdfX) => n(pdfX) * zoom;
            const pdfToScreenY = (pdfY) => (pageDims.height - n(pdfY)) * zoom;
            const screenToPdfX = (sx) => sx / zoom;
            const screenToPdfY = (sy) => pageDims.height - (sy / zoom);

            // ── Renderizar preview en canvas con PDF.js ──
            const renderPreview = useCallback(async () => {
                if (!pdfBytes || !canvasRef.current) return;
                setIsRendering(true);
                try {
                    await window.AquaShieldPDF.init();
                    const { PDFDocument, StandardFonts } = window.PDFLib;
                    const pdfDoc = await PDFDocument.load(pdfBytes);
                    const font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                    const firstPage = pdfDoc.getPages()[0];
                    const { width, height } = firstPage.getSize();
                    setPageDims({ width, height });

                    // Solo aplicar grid en el render, NO las operaciones (las dibujamos como overlay)
                    if (showGrid) {
                        const { rgb } = window.PDFLib;
                        for (let x = 0; x < width; x += 50) {
                            firstPage.drawLine({ start: { x, y: 0 }, end: { x, y: height }, color: rgb(0.6, 0.8, 1), thickness: 0.5 });
                            firstPage.drawText(x.toString(), { x: x + 2, y: height - 14, size: 8, font, color: rgb(0, 0, 0.7) });
                        }
                        for (let y = 0; y < height; y += 50) {
                            firstPage.drawLine({ start: { x: 0, y }, end: { x: width, y }, color: rgb(0.6, 0.8, 1), thickness: 0.5 });
                            firstPage.drawText(y.toString(), { x: 3, y: y + 2, size: 8, font, color: rgb(0, 0.5, 0) });
                        }
                    }

                    const modifiedBytes = await pdfDoc.save();
                    const loadingTask = pdfjsLib.getDocument({ data: modifiedBytes });
                    const pdf = await loadingTask.promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: zoom });
                    const canvas = canvasRef.current;
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');

                    if (renderTaskRef.current) { try { renderTaskRef.current.cancel(); } catch(e) {} }
                    const renderTask = page.render({ canvasContext: ctx, viewport });
                    renderTaskRef.current = renderTask;
                    await renderTask.promise;
                    setPreviewReady(true);
                } catch (err) {
                    if (err?.name !== 'RenderingCancelledException') console.error('Error en preview:', err);
                } finally { setIsRendering(false); }
            }, [pdfBytes, showGrid, zoom]);

            // Auto-zoom para llenar el ancho del panel al cargar un PDF
            useEffect(() => {
                if (pageDims.width > 0 && previewContainerRef.current && !hasAutoZoomed.current) {
                    const containerWidth = previewContainerRef.current.clientWidth - 32;
                    const fitZoom = containerWidth / pageDims.width;
                    setZoom(Math.round(fitZoom * 100) / 100);
                    hasAutoZoomed.current = true;
                }
            }, [pageDims]);

            // Debounce del render (solo re-render base cuando cambia grid/zoom/pdf)
            useEffect(() => {
                if (!pdfBytes) return;
                if (debounceTimer.current) clearTimeout(debounceTimer.current);
                debounceTimer.current = setTimeout(renderPreview, 300);
                return () => { if (debounceTimer.current) clearTimeout(debounceTimer.current); };
            }, [pdfBytes, showGrid, zoom, renderPreview]);

            // ── Drag & Resize handlers ──
            const handleOverlayMouseDown = (e, opId, mode) => {
                e.stopPropagation();
                e.preventDefault();
                const op = operations.find(o => o.id === opId);
                if (!op) return;
                setSelectedOpId(opId);
                setDragState({ opId, mode, startX: e.clientX, startY: e.clientY, origOp: { ...op } });
            };

            const handleOverlayMouseMove = useCallback((e) => {
                if (!dragState) return;
                const dx = e.clientX - dragState.startX;
                const dy = e.clientY - dragState.startY;
                const orig = dragState.origOp;
                const pdfDx = dx / zoom;
                const pdfDy = -dy / zoom; // inverted Y

                setOperations(prev => prev.map(op => {
                    if (op.id !== dragState.opId) return op;
                    const updated = { ...op };

                    if (dragState.mode === 'move') {
                        updated.x = Math.round(n(orig.x) + pdfDx);
                        updated.y = Math.round(n(orig.y) + pdfDy);
                    } else if (dragState.mode === 'resize-br') {
                        updated.width = Math.max(10, Math.round(n(orig.width) + pdfDx));
                        updated.height = Math.max(10, Math.round(n(orig.height) - pdfDy));
                    } else if (dragState.mode === 'resize-bl') {
                        updated.x = Math.round(n(orig.x) + pdfDx);
                        updated.width = Math.max(10, Math.round(n(orig.width) - pdfDx));
                        updated.height = Math.max(10, Math.round(n(orig.height) - pdfDy));
                    } else if (dragState.mode === 'resize-tr') {
                        updated.width = Math.max(10, Math.round(n(orig.width) + pdfDx));
                        updated.y = Math.round(n(orig.y) + pdfDy);
                        updated.height = Math.max(10, Math.round(n(orig.height) + pdfDy));
                    } else if (dragState.mode === 'resize-tl') {
                        updated.x = Math.round(n(orig.x) + pdfDx);
                        updated.y = Math.round(n(orig.y) + pdfDy);
                        updated.width = Math.max(10, Math.round(n(orig.width) - pdfDx));
                        updated.height = Math.max(10, Math.round(n(orig.height) + pdfDy));
                    } else if (dragState.mode === 'resize-r') {
                        updated.width = Math.max(10, Math.round(n(orig.width) + pdfDx));
                    } else if (dragState.mode === 'resize-b') {
                        updated.height = Math.max(10, Math.round(n(orig.height) - pdfDy));
                    }
                    return updated;
                }));
            }, [dragState, zoom]);

            const handleOverlayMouseUp = useCallback(() => {
                setDragState(null);
            }, []);

            useEffect(() => {
                if (dragState) {
                    window.addEventListener('mousemove', handleOverlayMouseMove);
                    window.addEventListener('mouseup', handleOverlayMouseUp);
                    return () => {
                        window.removeEventListener('mousemove', handleOverlayMouseMove);
                        window.removeEventListener('mouseup', handleOverlayMouseUp);
                    };
                }
            }, [dragState, handleOverlayMouseMove, handleOverlayMouseUp]);

            // Helper to get screen rect for an operation
            const getScreenRect = (op) => {
                if (op.type === 'rect' || op.type === 'image') {
                    return {
                        left: pdfToScreenX(op.x),
                        top: pdfToScreenY(n(op.y) + n(op.height)),
                        width: n(op.width) * zoom,
                        height: n(op.height) * zoom
                    };
                } else if (op.type === 'notes') {
                    return {
                        left: pdfToScreenX(op.x),
                        top: pdfToScreenY(n(op.y) + n(op.height || 80)),
                        width: n(op.width || 250) * zoom,
                        height: n(op.height || 80) * zoom
                    };
                } else {
                    const fontSize = n(op.size || 14);
                    const estWidth = (op.text || '').length * fontSize * 0.6;
                    return {
                        left: pdfToScreenX(op.x),
                        top: pdfToScreenY(n(op.y) + fontSize * 0.8),
                        width: estWidth * zoom,
                        height: fontSize * zoom * 1.2
                    };
                }
            };

            // ── Carga de archivos ──
            const loadFile = async (files) => {
                const pdfs = Array.from(files).filter(f => f.type === 'application/pdf');
                if (pdfs.length === 0) return;
                
                // El primer PDF se usa para la previsualización
                const first = pdfs[0];
                const bytes = new Uint8Array(await first.arrayBuffer());
                setPdfBytes(bytes);
                setPdfFileName(first.name);
                setOutputUrl(null);
                hasAutoZoomed.current = false; // Reset para auto-zoom con nuevo PDF

                // Guardar todos los archivos para procesamiento masivo
                const allFiles = [];
                for (const f of pdfs) {
                    allFiles.push({ name: f.name, size: f.size, data: new Uint8Array(await f.arrayBuffer()) });
                }
                setMultipleFiles(allFiles);
            };

            // ── Operaciones CRUD ──
            const addRect = () => {
                setOperations(prev => [...prev, {
                    id: crypto.randomUUID(), type: 'rect', label: 'Nuevo Recuadro',
                    x: 100, y: 400, width: 150, height: 40, color: '#FFFFFF'
                }]);
            };

            const addText = () => {
                setOperations(prev => [...prev, {
                    id: crypto.randomUUID(), type: 'text', label: 'Nuevo Texto',
                    text: 'TEXTO', x: 200, y: 500, size: 14, color: '#FF0000'
                }]);
            };

            const addNotes = () => {
                setOperations(prev => [...prev, {
                    id: crypto.randomUUID(), type: 'notes', label: 'Notas',
                    text: 'Línea 1\nLínea 2\nLínea 3', x: 50, y: 200, width: 250, height: 80, size: 9, lineHeight: 14, color: '#000000'
                }]);
            };

            const addImage = () => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'image/*';
                input.onchange = e => {
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const img = new window.Image();
                        img.onload = () => {
                            // Escalar a max 540px ancho manteniendo ratio
                            const maxW = 540;
                            const scale = Math.min(maxW / img.width, 1);
                            setOperations(prev => [...prev, {
                                id: crypto.randomUUID(), type: 'image', label: 'Imagen Adjunta',
                                x: 30, y: 155, width: Math.round(img.width * scale), height: Math.round(img.height * scale),
                                imageData: ev.target.result,
                            }]);
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            };

            const pasteImage = useCallback((e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const file = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = ev => {
                            const img = new window.Image();
                            img.onload = () => {
                                const maxW = 540;
                                const scale = Math.min(maxW / img.width, 1);
                                setOperations(prev => [...prev, {
                                    id: crypto.randomUUID(), type: 'image', label: 'Imagen Adjunta',
                                    x: 30, y: 155, width: Math.round(img.width * scale), height: Math.round(img.height * scale),
                                    imageData: ev.target.result,
                                }]);
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                        break;
                    }
                }
            }, []);

            const removeOp = (id) => {
                setOperations(prev => prev.filter(op => op.id !== id));
            };

            const duplicateOp = (op) => {
                setOperations(prev => [...prev, { ...op, id: crypto.randomUUID(), label: op.label + ' (copia)', x: Number(op.x) + 20, y: Number(op.y) - 20 }]);
            };

            const updateOp = (id, field, value) => {
                setOperations(prev => prev.map(op => op.id === id ? { ...op, [field]: value } : op));
            };

            const moveOp = (index, direction) => {
                setOperations(prev => {
                    const arr = [...prev];
                    const target = index + direction;
                    if (target < 0 || target >= arr.length) return arr;
                    [arr[index], arr[target]] = [arr[target], arr[index]];
                    return arr;
                });
            };

            // ── Guardar / Procesar ──
            // Guardar ops actuales al perfil activo (sync state + localStorage)
            const saveCurrentToProfile = (ops) => {
                const freshData = window.AquaShieldPDF.loadProfiles();
                const profile = freshData.profiles.find(p => p.id === freshData.activeId);
                if (profile) {
                    profile.operations = ops || operations;
                    window.AquaShieldPDF.saveProfiles(freshData);
                    setProfiles(freshData);
                }
            };

            const saveConfig = () => {
                // Guardar sin imageData para evitar imágenes fantasma en localStorage
                const cleanOps = operations.map(op => {
                    if (op.type === 'image') {
                        const { imageData, ...rest } = op;
                        return rest;
                    }
                    return op;
                });
                saveCurrentToProfile(cleanOps);
                setSaveMessage("✅ Configuración guardada correctamente");
                showToast('Configuración guardada correctamente', 'success');
                setTimeout(() => setSaveMessage(""), 3000);
            };

            const processBatch = async () => {
                if (multipleFiles.length === 0) return;
                setIsProcessing(true);
                try {
                    const result = await window.AquaShieldPDF.processFiles(multipleFiles, operations, { calibrationMode, showGrid });
                    setOutputUrl(result.url);
                    setOutputName(result.name);
                    setIsZip(result.isZip);
                } catch(err) { console.error(err); }
                finally { setIsProcessing(false); }
            };

            // ═══════════════════════════════════════════════════
            // ── MERMAS MODULE LOGIC ──
            // ═══════════════════════════════════════════════════
            const mCanvasRef = useRef(null);
            const mFileInputRef = useRef(null);
            const mPreviewTimer = useRef(null);

            const mFmtNum = (n, decimals=2) => {
                const parts = n.toFixed(decimals).split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return parts.join(',');
            };

            async function mExtractTable(pdfBytes) {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(pdfBytes)}).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                const items = textContent.items.map(item => ({
                    text: item.str.trim(), x: item.transform[4],
                    y: item.transform[5], width: item.width,
                    fontSize: item.transform[0]
                })).filter(i => i.text);
                items.sort((a, b) => b.y - a.y || a.x - b.x);
                const rows = [];
                let currentRow = [], currentY = items[0]?.y;
                for (const item of items) {
                    if (Math.abs(item.y - currentY) > 4) {
                        if (currentRow.length > 0) rows.push({y: currentY, items: [...currentRow]});
                        currentRow = []; currentY = item.y;
                    }
                    currentRow.push(item);
                }
                if (currentRow.length > 0) rows.push({y: currentY, items: currentRow});
                const productRows = [];
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const cajasItem = row.items.find(it => /caja/i.test(it.text));
                    if (!cajasItem) continue;
                    let cajas = 0, cajasFormat = 'unknown';
                    const matchA = cajasItem.text.match(/[¬\-]\s*(\d[\d.,]*)\s*Caja/i);
                    const matchB = cajasItem.text.match(/^(\d[\d.,]*)\s*Caja/i);
                    if (matchA) { cajas = parseInt(matchA[1].replace(/[.,]/g, '')); cajasFormat = 'combined'; }
                    else if (matchB) { cajas = parseInt(matchB[1].replace(/[.,]/g, '')); cajasFormat = 'separate'; }
                    else continue;
                    let mainRow = null;
                    for (let j = i - 1; j >= Math.max(0, i - 4); j--) {
                        if (rows[j].items.some(it => /^\d{6,8}$/.test(it.text) && it.x < 80)) { mainRow = rows[j]; break; }
                    }
                    if (!mainRow) continue;
                    const sorted = [...mainRow.items].sort((a, b) => a.x - b.x);
                    const codeItem = sorted.find(it => /^\d{6,8}$/.test(it.text) && it.x < 80);
                    const qtyItem = sorted.find(it => /\d.*(KG|LB)$/i.test(it.text) && it.x >= 80 && it.x <= 150);
                    let quantity = 0, qtyUnit = 'KG';
                    if (qtyItem) {
                        const um = qtyItem.text.match(/(KG|LB)$/i);
                        qtyUnit = um ? um[1].toUpperCase() : 'KG';
                        quantity = parseFloat(qtyItem.text.replace(/\s*(KG|LB)$/i, '').replace(/\./g, '').replace(',', '.'));
                    }
                    const unitItem = sorted.find(it => /^\d[\d.,]+$/.test(it.text) && it.x >= 440 && it.x <= 530);
                    let unitValue = unitItem ? parseFloat(unitItem.text.replace(/\./g, '').replace(',', '.')) : 0;
                    const totalItem = sorted.filter(it => /^\d[\d.,]+$/.test(it.text) && it.x > 530).pop();
                    let total = totalItem ? parseFloat(totalItem.text.replace(/\./g, '').replace(',', '.')) : 0;
                    const qtyPerBox = cajas > 0 ? quantity / cajas : 0;
                    productRows.push({
                        id: crypto.randomUUID(), code: codeItem?.text || '',
                        originalCajas: cajas, newCajas: cajas, qtyPerBox: Math.round(qtyPerBox * 10000) / 10000,
                        qtyUnit, unitValue, originalQuantity: quantity, originalTotal: total, cajasFormat,
                        qtyItem: qtyItem ? { x: qtyItem.x, y: qtyItem.y, width: qtyItem.width, fontSize: qtyItem.fontSize } : null,
                        totalItem: totalItem ? { x: totalItem.x, y: totalItem.y, width: totalItem.width, fontSize: totalItem.fontSize } : null,
                        cajasItemCoords: { x: cajasItem.x, y: cajasItem.y, width: cajasItem.width, text: cajasItem.text, fontSize: cajasItem.fontSize },
                    });
                }
                let grandTotalY = 0, grandTotalValue = 0, grandTotalX = 540;
                for (const row of rows) {
                    if (row.items.some(it => /TOTAL\s*(CIF|CPT|FOB|CFR)/i.test(it.text))) {
                        const numItem = row.items.filter(it => /^\d[\d.,]+$/.test(it.text) && it.x > 480).pop();
                        if (numItem) { grandTotalValue = parseFloat(numItem.text.replace(/\./g, '').replace(',', '.')); grandTotalY = numItem.y; grandTotalX = numItem.x; }
                        break;
                    }
                }
                return { products: productRows, grandTotal: { y: grandTotalY, value: grandTotalValue, x: grandTotalX } };
            }

            const loadMermasPDF = async (file) => {
                setMIsParsing(true);
                try {
                    const ab = await file.arrayBuffer();
                    const bytes = new Uint8Array(ab);
                    const result = await mExtractTable(bytes);
                    setMPdfBytes(bytes);
                    setMFileName(file.name);
                    setMProducts(result.products);
                    setMGrandTotal(result.grandTotal);
                    if (result.products.length === 0) showToast('No se encontraron productos con "Cajas"', 'warning');
                    else showToast(result.products.length + ' productos encontrados', 'success');
                } catch (err) { console.error('[Mermas] Error:', err); showToast('Error: ' + err.message, 'error'); }
                setMIsParsing(false);
            };

            const updateMCajas = (id, value) => {
                const n = parseInt(value) || 0;
                setMProducts(prev => prev.map(p => p.id === id ? { ...p, newCajas: n } : p));
            };
            const resetMermas = () => { setMProducts(prev => prev.map(p => ({ ...p, newCajas: p.originalCajas }))); showToast('Valores restaurados', 'info'); };

            // Mermas calculated values
            const mCalcProducts = mProducts.map(p => {
                const newQty = p.newCajas * p.qtyPerBox;
                const newTotal = newQty * p.unitValue;
                return { ...p, newQuantity: newQty, newTotal, changed: p.newCajas !== p.originalCajas };
            });
            const mNewGrandTotal = mCalcProducts.reduce((s, p) => s + p.newTotal, 0);
            const mTotalCajasOrig = mProducts.reduce((s, p) => s + p.originalCajas, 0);
            const mTotalCajasNew = mProducts.reduce((s, p) => s + p.newCajas, 0);
            const mHasChanges = mCalcProducts.some(p => p.changed);

            const buildMermasPDF = async () => {
                if (!mPdfBytes || !window.PDFLib) return null;
                try {
                    const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
                    const pdfDoc = await PDFDocument.load(new Uint8Array(mPdfBytes));
                    const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
                    const fontBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                    const page = pdfDoc.getPages()[0];
                    for (const p of mCalcProducts) {
                        if (!p.changed) continue;
                        const qFs = p.qtyItem?.fontSize || 7;
                        const tFs = p.totalItem?.fontSize || 7;
                        const cFs = p.cajasItemCoords?.fontSize || 6;
                        if (p.qtyItem) {
                            page.drawRectangle({ x: p.qtyItem.x - 4, y: p.qtyItem.y - 1.5, width: p.qtyItem.width + 4, height: qFs + 2, color: rgb(1,1,1) });
                            page.drawText(mFmtNum(p.newQuantity) + ' ' + p.qtyUnit, { x: p.qtyItem.x - 4, y: p.qtyItem.y - 1.5, size: qFs, font, color: rgb(0,0,0) });
                        }
                        if (p.totalItem) {
                            page.drawRectangle({ x: p.totalItem.x - 6, y: p.totalItem.y - 1.5, width: p.totalItem.width + 6.5, height: tFs + 2, color: rgb(1,1,1) });
                            page.drawText(mFmtNum(p.newTotal), { x: p.totalItem.x - 6, y: p.totalItem.y - 1.5, size: tFs, font, color: rgb(0,0,0) });
                        }
                        if (p.cajasFormat === 'combined') {
                            const fullText = p.cajasItemCoords.text;
                            const symbolIdx = fullText.indexOf('\u00ac');
                            if (symbolIdx >= 0) {
                                const prop = symbolIdx / fullText.length;
                                const sx = p.cajasItemCoords.x + p.cajasItemCoords.width * prop;
                                const rw = p.cajasItemCoords.width * (1 - prop);
                                page.drawRectangle({ x: sx, y: p.cajasItemCoords.y - 1.5, width: rw + 5, height: cFs + 2, color: rgb(1,1,1) });
                                page.drawText('\u00ac ' + p.newCajas + ' Cajas', { x: sx, y: p.cajasItemCoords.y - 1.5, size: cFs, font, color: rgb(0,0,0) });
                            }
                        } else if (p.cajasFormat === 'separate') {
                            page.drawRectangle({ x: p.cajasItemCoords.x, y: p.cajasItemCoords.y - 1.5, width: p.cajasItemCoords.width + 5, height: cFs + 2, color: rgb(1,1,1) });
                            page.drawText(p.newCajas + ' Cajas', { x: p.cajasItemCoords.x, y: p.cajasItemCoords.y - 1.5, size: cFs, font, color: rgb(0,0,0) });
                        }
                    }
                    if (mGrandTotal.y && mHasChanges) {
                        page.drawRectangle({ x: mGrandTotal.x - 16, y: mGrandTotal.y - 1.5, width: 50, height: 10, color: rgb(1,1,1) });
                        page.drawText(mFmtNum(mNewGrandTotal), { x: mGrandTotal.x - 16, y: mGrandTotal.y - 1.5, size: 8, font: fontBold, color: rgb(0,0,0) });
                    }
                    // Apply Commercial Invoice profile operations (whiteouts, text, stamps, etc.)
                    const activeOps = window.AquaShieldPDF?.loadOperations?.() || [];
                    if (activeOps.length > 0) {
                        await window.AquaShieldPDF.applyOperations(page, fontBold, activeOps);
                    }
                    return await pdfDoc.save();
                } catch (err) { console.error(err); showToast('Error: ' + err.message, 'error'); return null; }
            };

            const downloadMermasPDF = async () => {
                setMIsProcessing(true);
                const bytes = await buildMermasPDF();
                if (bytes) {
                    const blob = new Blob([bytes], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'MERMA_' + mFileName; a.click();
                    URL.revokeObjectURL(url);
                    showToast('PDF generado: MERMA_' + mFileName, 'success');
                }
                setMIsProcessing(false);
            };

            const renderMermasPreview = useCallback(async () => {
                if (!mPdfBytes) return;
                // Wait for canvas to be mounted (might not be ready immediately after state change)
                const canvas = mCanvasRef.current;
                if (!canvas) {
                    setTimeout(() => renderMermasPreview(), 200);
                    return;
                }
                try {
                    let bytesForRender = mPdfBytes;
                    if (mHasChanges) {
                        const mod = await buildMermasPDF();
                        if (mod) bytesForRender = mod;
                    }
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(bytesForRender) }).promise;
                    const pg = await pdf.getPage(1);
                    const vp = pg.getViewport({ scale: mPreviewScale });
                    canvas.width = vp.width;
                    canvas.height = vp.height;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    await pg.render({ canvasContext: ctx, viewport: vp }).promise;

                } catch (err) { console.error('[Mermas] Preview error:', err); }
            }, [mPdfBytes, mProducts, mPreviewScale, mHasChanges]);

            useEffect(() => {
                if (!mPdfBytes || !mShowPreview || activeModule !== 'mermas') return;
                if (mPreviewTimer.current) clearTimeout(mPreviewTimer.current);
                mPreviewTimer.current = setTimeout(() => renderMermasPreview(), 500);
                return () => clearTimeout(mPreviewTimer.current);
            }, [mPdfBytes, mProducts, mPreviewScale, mShowPreview, renderMermasPreview, activeModule]);

            // ── Render ──
            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* ═══ HEADER: Manual de Marca AquaChile ═══ */}
                    <header style={{height:'64px', background:'#3a4a58', padding:'0 1.5rem', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid #4a5a68', flexShrink:0}}>
                        <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
                            <img src="logo_aquachile_dark.png" alt="AquaChile" style={{height:'36px', objectFit:'contain', filter:'invert(1) brightness(2)'}}/>
                            <div style={{display:'flex', flexDirection:'column', lineHeight:'1.1'}}>
                                <span style={{fontFamily:'Quicksand, sans-serif', fontWeight:700, fontSize:'1.4rem', color:'#f8fafc', letterSpacing:'2px'}}>AQUASHIELD</span>
                                <span style={{fontSize:'0.8rem', color:'#8fa0b0'}}>by AquaChile</span>
                            </div>
                            <div style={{height:'32px', width:'1px', backgroundColor:'#4a5a68', margin:'0 0.5rem'}}></div>
                            <div style={{display:'flex', flexDirection:'column', lineHeight:'1.1', justifyContent:'center'}}>
                                <span style={{fontFamily:'Quicksand, sans-serif', fontWeight:600, fontSize:'0.75rem', color:'#EB5F0A', letterSpacing:'2px', textTransform:'uppercase'}}>Módulo</span>
                                <span style={{fontFamily:'Quicksand, sans-serif', fontWeight:700, fontSize:'1.05rem', color:'#f8fafc', letterSpacing:'1px', textTransform:'uppercase'}}>{activeModule === 'invoice' ? 'Commercial Invoice' : 'Factura Mermas'}</span>
                            </div>
                            <span style={{background:'#EB5F0A', color:'white', fontSize:'10px', fontWeight:700, padding:'3px 10px', borderRadius:'20px', letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Quicksand, sans-serif', marginLeft:'0.5rem'}}>ADMIN</span>
                        </div>
                        <div style={{display:'flex', alignItems:'center', gap:'0.8rem'}}>
                            {saveMessage && <span className="text-green-400 text-sm font-bold animate-pulse">{saveMessage}</span>}
                            <button onClick={saveConfig} style={{display:'flex', alignItems:'center', gap:'0.5rem', background:'#445563', color:'white', padding:'0.5rem 1.2rem', borderRadius:'10px', border:'none', fontFamily:'Quicksand, sans-serif', fontWeight:700, fontSize:'0.8rem', cursor:'pointer', textTransform:'uppercase', letterSpacing:'1px', transition:'all 0.3s ease'}} onMouseEnter={e => {e.target.style.background='#EB5F0A'; e.target.style.transform='translateY(-2px)'; e.target.style.boxShadow='0 8px 20px rgba(235,95,10,0.25)';}} onMouseLeave={e => {e.target.style.background='#445563'; e.target.style.transform='translateY(0)'; e.target.style.boxShadow='none';}}>
                                <SaveIcon size={14}/> <span>Guardar Config</span>
                            </button>
                            <div className="admin-user-profile">
                                <span className="mono" style={{fontSize:'0.7rem', fontWeight:600, color:'#8fa0b0'}}>ADMIN Marcelo Ramírez</span>
                                <div className="admin-avatar"><UserIcon size={16}/></div>
                            </div>
                        </div>
                    </header>

                    {/* ═══ MODULE TABS ═══ */}
                    <div className="module-tabs">
                        <button className={'module-tab' + (activeModule === 'invoice' ? ' active' : '')} onClick={() => setActiveModule('invoice')}>📄 Commercial Invoice</button>
                        <button className={'module-tab' + (activeModule === 'mermas' ? ' active' : '')} onClick={() => setActiveModule('mermas')}>📦 Factura Mermas</button>
                    </div>

                    {/* ═══ INVOICE MODULE ═══ */}
                    {activeModule === 'invoice' && <>

                    {/* ═══ PROFILE TOOLBAR ═══ */}
                    <div style={{display:'flex',alignItems:'center',gap:'0.6rem',padding:'0.5rem 1.5rem',background:'#2d3a45',borderBottom:'1px solid #4a5a68',flexShrink:0}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8fa0b0" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                        <span className="mono" style={{fontSize:'0.65rem',color:'#8fa0b0',fontWeight:700,textTransform:'uppercase'}}>Plantilla:</span>
                        {editingProfileName ? (
                            <input
                                autoFocus
                                defaultValue={window.AquaShieldPDF.getActiveProfile(profiles)?.name || ''}
                                className="mono"
                                style={{fontSize:'0.75rem',fontWeight:600,background:'#445563',border:'1px solid #EB5F0A',borderRadius:'6px',padding:'3px 8px',color:'#f8fafc',outline:'none',width:'180px'}}
                                onBlur={e => handleRenameProfile(e.target.value)}
                                onKeyDown={e => { if(e.key === 'Enter') handleRenameProfile(e.target.value); if(e.key === 'Escape') setEditingProfileName(false); }}
                            />
                        ) : (
                            <select
                                value={profiles.activeId || ''}
                                onChange={e => switchProfile(e.target.value)}

                                                const borderColor = isSelected ? '#EB5F0A' : (isImg ? '#9333EA' : (isRect ? '#E53E3E' : (op.type === 'notes' ? '#D69E2E' : '#38A169')));

                                                            else if (corner === 'tr') { hLeft = rect.left + rect.width - handleSize/2; hTop = rect.top - handleSize/2; cursor = 'nesw-resize'; }
                                                            else if (corner === 'bl') { hLeft = rect.left - handleSize/2; hTop = rect.top + rect.height - handleSize/2; cursor = 'nesw-resize'; }
                                                            else if (corner === 'br') { hLeft = rect.left + rect.width - handleSize/2; hTop = rect.top + rect.height - handleSize/2; cursor = 'nwse-resize'; }
                                                            else if (corner === 'r') { hLeft = rect.left + rect.width - handleSize/2; hTop = rect.top + rect.height/2 - handleSize/2; cursor = 'ew-resize'; }
                                                            else if (corner === 'b') { hLeft = rect.left + rect.width/2 - handleSize/2; hTop = rect.top + rect.height - handleSize/2; cursor = 'ns-resize'; }
                                                            return (
                                                                <div key={corner}
                                                                    style={{
                                                                        position: 'absolute', left: hLeft + 'px', top: hTop + 'px',
                                                                        width: handleSize + 'px', height: handleSize + 'px',
                                                                        background: '#EB5F0A', border: '1px solid #fff',
                                                                        borderRadius: '2px', cursor, zIndex: 30
                                                                    }}
                                                                    onMouseDown={e => handleOverlayMouseDown(e, op.id, 'resize-' + corner)}

                                    <div className="flex gap-2">
                                        <button onClick={() => setMShowPreview(!mShowPreview)} className="flex items-center gap-1 bg-[#445563] hover:bg-[#4a5a68] text-white py-2 px-4 rounded-lg text-xs font-bold transition-all border border-[#4a5a68]">{mShowPreview ? '◧ Ocultar Preview' : '◫ Mostrar Preview'}</button>
                                        <button onClick={downloadMermasPDF} disabled={!mHasChanges || mIsProcessing} className={'flex items-center gap-2 py-2.5 px-5 rounded-xl font-bold text-white font-display transition-all ' + (!mHasChanges || mIsProcessing ? 'bg-gray-600 cursor-not-allowed' : 'bg-brand-accent hover:bg-[#d45508] shadow-lg glow-accent')}>{mIsProcessing ? '⟳ Generando...' : '⬇ Generar PDF Merma'}</button>
                                    </div>
                                </div>
                            </div>
                            {/* Right: Preview */}
                            {mShowPreview && (
                                <div className="m-preview-panel" style={{flex:'0 0 44%'}}>
                                    <div className="m-preview-header">
                                        <span style={{fontFamily:'Quicksand,sans-serif',fontWeight:700,fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'1px',color:'#8fa0b0'}}>📄 Vista Previa</span>
                                        <div className="flex items-center gap-1">
                                            <button className="m-zoom-btn" onClick={() => setMPreviewScale(s => Math.max(0.5, s - 0.2))}>−</button>
                                            <span className="mono" style={{fontSize:'0.65rem',color:'#8fa0b0',minWidth:'35px',textAlign:'center'}}>{Math.round(mPreviewScale*100)}%</span>
                                            <button className="m-zoom-btn" onClick={() => setMPreviewScale(s => Math.min(3, s + 0.2))}>+</button>
                                        </div>
                                    </div>
                                    <div className="m-preview-wrap">
                                        <canvas ref={mCanvasRef} style={{background:'white'}} />
                                    </div>
                                </div>
                            )}
                            </>
                        )}
                    </div>
                    )}

                </div>
            );
        }

        // ── Componente de Capa individual ─────────────────
        function LayerCard({ op, index, total, onUpdate, onRemove, onDuplicate, onMove }) {
            const [collapsed, setCollapsed] = useState(false);
            const isRect = op.type === 'rect';
            const isNotes = op.type === 'notes';
            const isImage = op.type === 'image';
            const dotColor = isImage ? 'bg-purple-400' : (isRect ? 'bg-red-400' : (isNotes ? 'bg-amber-400' : 'bg-emerald-400'));

            return (
                <div className="layer-card bg-[#3a4a58] rounded-lg border border-[#4a5a68] overflow-hidden hover:border-[#5a6a78] transition-colors">
                    {/* Header de la capa */}
                    <div className="flex items-center justify-between px-3 py-2 bg-[#3a4a58] cursor-pointer" onClick={() => setCollapsed(!collapsed)}>
                        <div className="flex items-center space-x-2 flex-1 min-w-0">
                            <span className={"w-3 h-3 rounded-full flex-shrink-0 " + dotColor}></span>
                            <input
                                type="text"
                                value={op.label}
                                onChange={e => onUpdate(op.id, 'label', e.target.value)}
                                onClick={e => e.stopPropagation()}
                                className="bg-transparent text-white text-sm font-bold truncate outline-none border-b border-transparent hover:border-gray-600 focus:border-brand-accent w-full"
                            />
                        </div>
                        <div className="flex items-center space-x-1 flex-shrink-0 ml-2">
                            <button onClick={e => { e.stopPropagation(); onMove(index, -1); }} disabled={index === 0} className="p-1 text-gray-500 hover:text-white disabled:opacity-20 transition-colors" title="Mover arriba">▲</button>
                            <button onClick={e => { e.stopPropagation(); onMove(index, 1); }} disabled={index === total - 1} className="p-1 text-gray-500 hover:text-white disabled:opacity-20 transition-colors" title="Mover abajo">▼</button>
                            <button onClick={e => { e.stopPropagation(); onDuplicate(op); }} className="p-1 text-gray-500 hover:text-blue-400 transition-colors" title="Duplicar"><CopyIcon size={13}/></button>
                            <button onClick={e => { e.stopPropagation(); onRemove(op.id); }} className="p-1 text-gray-500 hover:text-red-400 transition-colors" title="Eliminar"><TrashIcon size={13}/></button>
                            <span className="text-gray-600 text-xs ml-1">{collapsed ? '▸' : '▾'}</span>
                        </div>
                    </div>

                    {/* Propiedades */}
                    {!collapsed && (
                        <div className="px-3 py-3 space-y-3">
                            {/* Contenido: input para texto, textarea para notas */}
                            {!isRect && !isImage && (
                                <div>
                                    <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">{isNotes ? 'Notas (una línea por Enter)' : 'Contenido'}</span>
                                    {isNotes ? (
                                        <textarea
                                            value={op.text || ''}
                                            onChange={e => onUpdate(op.id, 'text', e.target.value)}
                                            className="dark-input w-full text-left resize-y"
                                            style={{minHeight: '70px', fontFamily: 'monospace', fontSize: '11px', textAlign: 'left'}}
                                            placeholder={'Escribe cada línea...\nUsa Enter para nueva línea'}
                                        />
                                    ) : (
                                        <input type="text" value={op.text || ''} onChange={e => onUpdate(op.id, 'text', e.target.value)} className="dark-input w-full text-left" placeholder="Escribe el texto..." />
                                    )}
                                </div>
                            )}

                            {/* Posición X / Y */}
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">X</span>
                                    <input type="number" value={op.x} onChange={e => onUpdate(op.id, 'x', e.target.value)} className="dark-input w-full" />
                                </div>
                                <div>
                                    <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Y</span>
                                    <input type="number" value={op.y} onChange={e => onUpdate(op.id, 'y', e.target.value)} className="dark-input w-full" />
                                </div>
                            </div>

                            {/* Tamaño */}
                            {(isRect || isImage) ? (
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Ancho</span>
                                        <input type="number" value={op.width} onChange={e => onUpdate(op.id, 'width', e.target.value)} className="dark-input w-full" />
                                    </div>
                                    <div>
                                        <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Alto</span>
                                        <input type="number" value={op.height} onChange={e => onUpdate(op.id, 'height', e.target.value)} className="dark-input w-full" />
                                    </div>
                                </div>
                            ) : isNotes ? (
                                <>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Ancho</span>
                                        <input type="number" value={op.width || 250} onChange={e => onUpdate(op.id, 'width', e.target.value)} className="dark-input w-full" />
                                    </div>
                                    <div>
                                        <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Alto</span>
                                        <input type="number" value={op.height || 80} onChange={e => onUpdate(op.id, 'height', e.target.value)} className="dark-input w-full" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Tamaño Fuente</span>
                                        <input type="number" value={op.size || 10} onChange={e => onUpdate(op.id, 'size', e.target.value)} className="dark-input w-full" />
                                    </div>
                                    <div>
                                        <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Interlineado</span>
                                        <input type="number" value={op.lineHeight || 14} onChange={e => onUpdate(op.id, 'lineHeight', e.target.value)} className="dark-input w-full" />
                                    </div>
                                </div>
                                </>
                            ) : (
                                <div>
                                    <span className="text-[10px] text-gray-500 uppercase font-bold block mb-1">Tamaño Fuente</span>
                                    <input type="number" value={op.size || 14} onChange={e => onUpdate(op.id, 'size', e.target.value)} className="dark-input w-full" />
                                </div>
                            )}

                            {/* Color (no para imágenes) */}
                            {!isImage && (
                            <div className="flex items-center space-x-3">
                                <span className="text-[10px] text-gray-500 uppercase font-bold">Color</span>
                                <input type="color" value={op.color || (isRect ? '#FFFFFF' : isNotes ? '#000000' : '#FF0000')} onChange={e => onUpdate(op.id, 'color', e.target.value)} className="dark-input-color" />
                                <span className="text-xs text-gray-600 font-mono">{op.color || (isRect ? '#FFFFFF' : isNotes ? '#000000' : '#FF0000')}</span>
                            </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
